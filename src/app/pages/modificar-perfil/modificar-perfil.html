<section class="container mt-5 mb-5">

  <form [formGroup]="formPerfil" (ngSubmit)="guardarCambios()" class="p-4 rounded shadow" style="background: var(--color-tarjeta);">

    <h2 class="text-center mb-4 titulo-articulo">Actualiza tus datos ✨</h2>

    <!-- NOMBRE COMPLETO -->
    <div class="mb-3">
      <label class="form-label">Nombre completo</label>
      <input type="text" class="form-control" formControlName="nombreCompleto">
      <small class="text-danger" *ngIf="formPerfil.get('nombreCompleto')?.touched && formPerfil.get('nombreCompleto')?.invalid">
        Este campo es obligatorio.
      </small>
    </div>

    <!-- USUARIO -->
    <div class="mb-3">
      <label class="form-label">Nombre de usuario</label>
      <input type="text" class="form-control" formControlName="nombreUsuario">
      <small class="text-danger" *ngIf="formPerfil.get('nombreUsuario')?.touched && formPerfil.get('nombreUsuario')?.invalid">
        Este campo es obligatorio.
      </small>
    </div>

    <!-- CORREO -->
    <div class="mb-3">
      <label class="form-label">Correo electrónico</label>
      <input type="email" class="form-control" formControlName="correo">
      <small class="text-danger" *ngIf="formPerfil.get('correo')?.touched && formPerfil.get('correo')?.errors?.['email']">
        Debe ser un correo válido.
      </small>
    </div>

    <!-- DIRECCIÓN -->
    <div class="mb-3">
      <label class="form-label">Dirección</label>
      <input type="text" class="form-control" formControlName="direccion">
    </div>

    <!-- BOTONES -->
    <div class="d-flex gap-3 mt-4">
      <button type="submit" class="boton-animado w-50">
        Guardar cambios 💾
      </button>

      <a routerLink="/mi-perfil" class="boton-animado w-50 text-center">
        Volver ↩️
      </a>
    </div>

  </form>

</section>
