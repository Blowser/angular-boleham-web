<div class="detalles-container">

  <!-- LOADING -->
  <div *ngIf="cargando">
    <p>Cargando detalles del producto...</p>
  </div>

  <!-- CONTENIDO -->
  <div *ngIf="!cargando && producto">

    <h2>{{ producto.nombre }}</h2>

    <img [src]="producto.imagen" class="detalles-img">

    <p class="precio">${{ producto.precio }}</p>

    <p class="descripcion">{{ producto.descripcion }}</p>

    <button (click)="cargarProducto()">Recargar detalles 🔄</button>

  </div>

  <!-- ERROR -->
  <div *ngIf="!cargando && !producto">
    <p>No se encontró el producto. Intenta recargar.</p>
    <button (click)="cargarProducto()">Reintentar 🔄</button>
  </div>

</div>
