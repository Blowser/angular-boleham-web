<div class="detalles-container" *ngIf="producto">

  <img [src]="producto.imagen" class="detalles-img">

  <h2>{{ producto.nombre }}</h2>

  <p class="precio">${{ producto.precio }}</p>

  <p class="categoria">Categoría: {{ producto.categoria }}</p>

  <p class="descripcion">{{ producto.descripcion }}</p>

  <p class="descuento" *ngIf="producto.descuento">
    Descuento: ${{ producto.descuento }}
  </p>

  <button class="btn-carrito" (click)="agregarCarrito()">
    Agregar al carrito 🛒
  </button>

  <button class="btn-wishlist" (click)="agregarWishlist()">
    Añadir a wishlist 💖
  </button>

  <!-- ⭐ BOTÓN PARA RECARGAR LOS DETALLES -->
  <button class="btn-recargar" (click)="cargarProducto()">
    Recargar detalles 🔄
  </button>

</div>
