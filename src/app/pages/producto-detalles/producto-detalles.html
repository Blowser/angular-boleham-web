<section class="seccion-detalles" *ngIf="producto">

  <a routerLink="/" class="btn-volver boton-animado">⬅ Volver al inicio</a>

  <div class="detalles-container">

    <img [src]="producto.imagen"
         [alt]="producto.nombre"
         class="img-detalle">

    <div class="info-detalle">

      <h2>{{ producto.nombre }}</h2>

      <p class="categoria-detalle">
        Categoría: {{ producto.categoria }}
      </p>

      <p class="descripcion-detalle">
        {{ producto.descripcion }}
      </p>

      <p class="precio-detalle">
        Precio: ${{ producto.precio }}
      </p>

      <p class="descuento-detalle"
         [class.con-descuento]="producto.descuento"
         [class.sin-descuento]="!producto.descuento">
        {{ producto.descuento ? ('$' + producto.descuento) : 'Sin descuento' }}
      </p>

      <button class="btn-carrito">
        Agregar al carrito 🛒
      </button>

    </div>

  </div>

</section>
