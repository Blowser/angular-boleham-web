<section class="container mt-5 mb-5">

  <form [formGroup]="formLogin" (ngSubmit)="iniciarSesion()" class="p-4 rounded shadow" style="background: var(--color-tarjeta);">

    <h2 class="text-center mb-4 titulo-articulo">Bienvenido de vuelta ✨</h2>

    <!-- CORREO -->
    <div class="mb-3">
      <label class="form-label">Correo electrónico</label>
      <input type="email" class="form-control" formControlName="correo" placeholder="correo@ejemplo.com">

      <small class="text-danger" *ngIf="formLogin.get('correo')?.touched && formLogin.get('correo')?.errors?.['required']">
        El correo es obligatorio.
      </small>

      <small class="text-danger" *ngIf="formLogin.get('correo')?.touched && formLogin.get('correo')?.errors?.['email']">
        Debe ser un correo válido.
      </small>
    </div>

    <!-- CONTRASEÑA -->
    <div class="mb-3">
      <label class="form-label">Contraseña</label>
      <input type="password" class="form-control" formControlName="clave" placeholder="Tu contraseña">

      <small class="text-danger" *ngIf="formLogin.get('clave')?.touched && formLogin.get('clave')?.errors?.['required']">
        La contraseña es obligatoria.
      </small>
    </div>

    <div class="text-end mt-1">
      <a routerLink="/recuperar" class="link-nav">¿Olvidaste tu contraseña?</a>
    </div>

    <!-- BOTONES -->
    <div class="d-flex gap-3 mt-4">
      <button type="submit" class="boton-animado w-50">
        Iniciar sesión ✨
      </button>

      <button type="button" class="boton-animado w-50" (click)="limpiar()">
        Limpiar 🧹
      </button>
    </div>

    <p class="mt-4 text-center">
      ¿No tienes cuenta?
      <a routerLink="/registro" class="link-nav">Crea una aquí</a>
    </p>

  </form>

</section>
