<hr class="my-5">

<h2 class="text-center mb-4 titulo-articulo">Gestión de Productos 🛒</h2>

<!-- FORMULARIO -->
<div class="p-3 rounded mb-4" style="background: var(--color-tarjeta);">

  <h4>{{ editandoProducto ? 'Editar producto' : 'Crear producto' }}</h4>

  <form (ngSubmit)="guardarProducto()">

    <input class="form-control mb-2" type="text" placeholder="Nombre"
           [(ngModel)]="formularioProducto.nombre" name="nombre" required>

    <input class="form-control mb-2" type="text" placeholder="Categoría"
           [(ngModel)]="formularioProducto.categoria" name="categoria" required>

    <input class="form-control mb-2" type="number" placeholder="Precio"
           [(ngModel)]="formularioProducto.precio" name="precio" required>

    <input class="form-control mb-2" type="text" placeholder="Imagen (archivo)"
           [(ngModel)]="formularioProducto.imagen" name="imagen" required>

    <textarea class="form-control mb-2" placeholder="Descripción"
              [(ngModel)]="formularioProducto.descripcion" name="descripcion" required></textarea>

    <button class="boton-animado w-100 mt-2">
      {{ editandoProducto ? 'Actualizar producto' : 'Crear producto' }}
    </button>

  </form>
</div>

<!-- LISTA DE PRODUCTOS -->
<ul class="list-group">
  <li *ngFor="let p of productos" class="list-group-item d-flex justify-content-between align-items-center">

    <div>
      <strong>{{ p.nombre }}</strong> — {{ p.categoria }} — ${{ p.precio }}
    </div>

    <div>
      <button class="btn btn-sm btn-warning me-2" (click)="editarProducto(p)">Editar</button>
      <button class="btn btn-sm btn-danger" (click)="eliminarProducto(p.id)">Eliminar</button>
    </div>

  </li>
</ul>
