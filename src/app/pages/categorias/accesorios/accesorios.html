<div class="nav-interna">
  <a routerLink="/categorias/plushies-figuras" class="btn-volver boton-animado">⬅ Volver a Plushies & Figuras</a>
  <a routerLink="/" class="btn-siguiente boton-animado">Ir al Inicio ➜</a>
</div>

<div class="container">
  <div class="row g-4">

    <div class="col-12 col-md-6 col-lg-4"
         *ngFor="let p of productos">

      <article class="card-producto aparecer">
        <div class="card-producto-contenido">

          <img [src]="p.imagen"
               [alt]="p.nombre"
               class="img-producto">

          <h3 class="nombre-producto">{{ p.nombre }}</h3>

          <p class="descripcion-producto">{{ p.descripcion }}</p>

          <p class="precio-producto">${{ p.precio }}</p>

          <p class="descuento-producto"
             [class.con-descuento]="p.descuento"
             [class.sin-descuento]="!p.descuento">
            {{ p.descuento ? ('$' + p.descuento) : 'Sin descuento' }}
          </p>

          <!-- BOTÓN DETALLES -->
          <button class="btn-detalles" [routerLink]="['/producto', p.id]">
            Ver detalles 🔍
          </button>

          <!-- WISHLIST -->
          <button class="btn-wishlist" (click)="agregarWishlist(p)">
            Añadir a wishlist 💖
          </button>

          <!-- CARRITO -->
          <button class="btn-carrito" (click)="agregarAlCarrito(p)">
            Agregar al carrito 🛒
          </button>

        </div>
      </article>

    </div>

  </div>
</div>
