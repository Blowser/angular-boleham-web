<section id="categorias-principales">
  <h2 class="titulo-articulo">Elegir Categoría</h2>

  <div class="container">
    <div class="row g-4">

      <div class="col-12 col-md-6 col-lg-3">
        <article class="categoria aparecer">
          <a routerLink="/categorias/comics-libros">
            <img src="assets/img/categorias/boleham_co_comics-libros.jpg" alt="Cómics y Libros">
            <h3>Cómics & Libros</h3>
          </a>
        </article>
      </div>

      <div class="col-12 col-md-6 col-lg-3">
        <article class="categoria aparecer">
          <a routerLink="/categorias/arte-materiales">
            <img src="assets/img/categorias/boleham_co_arte-materiales.jpg" alt="Arte y Materiales">
            <h3>Arte & Materiales</h3>
          </a>
        </article>
      </div>

      <div class="col-12 col-md-6 col-lg-3">
        <article class="categoria aparecer">
          <a routerLink="/categorias/plushies-figuras">
            <img src="assets/img/categorias/boleham_co_plushies-figuras.jpg" alt="Plushies y Figuras">
            <h3>Plushies & Figuras</h3>
          </a>
        </article>
      </div>

      <div class="col-12 col-md-6 col-lg-3">
        <article class="categoria aparecer">
          <a routerLink="/categorias/accesorios">
            <img src="assets/img/categorias/boleham_co_accesorios.jpg" alt="Accesorios">
            <h3>Accesorios</h3>
          </a>
        </article>
      </div>

    </div>
  </div>
</section>

<article class="tarjeta-destacado aparecer-lado">
  <h2 class="titulo-articulo">Preventas</h2>

  <div class="container mt-4">
    <div class="row g-4">

      <div class="col-12 col-md-6 col-lg-3" *ngFor="let p of preventas">
        <article class="producto-card aparecer">
          <img [src]="'/assets/img/preventas/' + p.imagen" [alt]="p.nombre">

          <h3>{{ p.nombre }}</h3>
          <p class="precio">${{ p.precio | number }}</p>

          <a [routerLink]="['/producto', p.id]" class="btn btn-primary">
            Ver más
          </a>
        </article>
      </div>

    </div>
  </div>
</article>



<article class="tarjeta-destacado aparecer-lado">
  <h2 class="titulo-articulo">Noticias y Eventos</h2>
  <p>Este es el segundo artículo de la página.</p>
</article>
