<section class="container mt-5 mb-5">

  <form [formGroup]="formRecuperar" (ngSubmit)="actualizar()" class="p-4 rounded shadow" style="background: var(--color-tarjeta);">

    <h2 class="text-center mb-4 titulo-articulo">¿Olvidaste tu contraseña? 🔐</h2>

    <p class="text-center mb-4">
      Ingresa tu correo y crea una nueva contraseña segura.
    </p>

    <!-- CORREO -->
    <div class="mb-3">
      <label class="form-label">Correo registrado</label>
      <input type="email" class="form-control" formControlName="correo" placeholder="correo@ejemplo.com">

      <small class="text-danger" *ngIf="formRecuperar.get('correo')?.touched && formRecuperar.get('correo')?.errors?.['required']">
        El correo es obligatorio.
      </small>

      <small class="text-danger" *ngIf="formRecuperar.get('correo')?.touched && formRecuperar.get('correo')?.errors?.['email']">
        Debe ser un correo válido.
      </small>
    </div>

    <!-- NUEVA CONTRASEÑA -->
    <div class="mb-3">
      <label class="form-label">Nueva contraseña</label>
      <input type="password" class="form-control" formControlName="clave" placeholder="Nueva contraseña">

      <small class="text-danger" *ngIf="formRecuperar.get('clave')?.touched && formRecuperar.get('clave')?.errors?.['passwordSegura']">
        Debe tener una mayúscula, un número y entre 6 y 18 caracteres.
      </small>
    </div>

    <!-- CONFIRMAR CONTRASEÑA -->
    <div class="mb-3">
      <label class="form-label">Confirmar contraseña</label>
      <input type="password" class="form-control" formControlName="clave2" placeholder="Repite la contraseña">

      <small class="text-danger" *ngIf="formRecuperar.errors?.['contraseñasNoCoinciden'] && formRecuperar.get('clave2')?.touched">
        Las contraseñas no coinciden.
      </small>
    </div>

    <!-- BOTONES -->
    <div class="d-flex gap-3 mt-4">
      <button type="submit" class="boton-animado w-50">
        Actualizar contraseña 🔐
      </button>

      <button type="button" class="boton-animado w-50" (click)="limpiar()">
        Limpiar 🧹
      </button>
    </div>

    <p class="mt-4 text-center">
      ¿Recordaste tu contraseña?
      <a routerLink="/login" class="link-nav">Volver al inicio de sesión</a>
    </p>

  </form>

</section>
